name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build the DXT bundle BEFORE typecheck. scripts/build-dxt.sh installs
      # @anthropic-ai/dxt, packs the extension, embeds the bytes into
      # src/dxt-bundle.ts (gitignored — that's why typecheck fails without
      # this step), and writes the artifact to dist/absmartly-mcp.dxt.
      # Production deploys MUST use this rather than ensure-dxt-bundle.sh's
      # empty stub — the worker serves the embedded bytes at
      # /absmartly-mcp.dxt.
      - name: Build DXT bundle
        run: ./scripts/build-dxt.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
