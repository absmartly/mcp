name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Ensure DXT bundle stub for typecheck
        run: ./scripts/ensure-dxt-bundle.sh

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit
